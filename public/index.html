<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Bagus Ai</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --border: #e5e5e5;
            --user-bubble: #e3f2fd;
            --ai-bubble: #f0f0f2;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
        }

        [data-theme="dark"] {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #999;
            --border: #2a2a2a;
            --user-bubble: #1e3a5f;
            --ai-bubble: #2a2a2a;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
            flex-shrink: 0;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--bg-secondary);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome {
            text-align: center;
            margin: auto;
            max-width: 500px;
        }

        .welcome h1 {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .welcome .typing {
            color: var(--accent);
            border-right: 2px solid var(--accent);
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .suggestions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .suggestion-card {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .suggestion-card:hover {
            background: var(--border);
            transform: translateX(4px);
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--ai-bubble);
            border-bottom-left-radius: 4px;
            padding-bottom: 32px;
        }

        .copy-btn {
            position: absolute;
            bottom: 8px;
            left: 16px;
            font-size: 11px;
            opacity: 0.5;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn:hover {
            opacity: 1;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-primary);
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 28px;
            padding: 8px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .image-preview {
            display: none;
            margin-bottom: 8px;
            position: relative;
            width: 60px;
            height: 60px;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .remove-image {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 16px;
            padding: 10px 0;
            resize: none;
            max-height: 120px;
            font-family: inherit;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upload-status {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 8px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--bg-secondary);
            z-index: 1000;
            transition: left 0.3s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            left: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 16px;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .history-item:hover {
            background: var(--border);
        }

        .delete-history {
            color: #ff4d4d;
            cursor: pointer;
            padding: 4px;
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <span style="font-size: 20px; font-weight: bold;">Bagus Ai</span>
            <i class="fas fa-times" id="closeSidebar" style="cursor: pointer;"></i>
        </div>
        <div style="margin-bottom: 16px;">
            <div class="menu-item" id="newChatSidebar" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; background: var(--accent); color: white;">
                <i class="fas fa-plus"></i> New Chat
            </div>
        </div>
        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">RECENT CHATS</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <header>
        <div style="display: flex; align-items: center; gap: 16px;">
            <i class="fas fa-bars icon-btn" id="menuBtn"></i>
            <span class="logo">Bagus Ai</span>
        </div>
        <div class="header-actions">
            <i class="fas fa-plus icon-btn" id="newChatBtn"></i>
            <i class="fas fa-moon icon-btn" id="themeBtn"></i>
        </div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <h1>Halo, <span id="typer" class="typing">Bagus!</span></h1>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">Ada yang bisa aku bantu?</p>
            <div class="suggestions">
                <div class="suggestion-card" data-msg="Buatkan kode API dengan Node.js">💻 Buatkan kode API dengan Node.js</div>
                <div class="suggestion-card" data-msg="Jelaskan konsep AI secara sederhana">🤖 Jelaskan konsep AI secara sederhana</div>
                <div class="suggestion-card" data-msg="Tips belajar coding untuk pemula">📚 Tips belajar coding untuk pemula</div>
                <div class="suggestion-card" data-msg="Apa kabar Bagus Ai?">💬 Apa kabar Bagus Ai?</div>
            </div>
        </div>
        <div id="messages" style="display: none; flex-direction: column; gap: 16px;"></div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <i class="fas fa-image icon-btn" id="imageBtn" style="margin-bottom: 4px;"></i>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <textarea id="messageInput" placeholder="Ketik pesan atau tanya tentang gambar..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div class="upload-status" id="uploadStatus"></div>
        <div class="image-preview" id="imagePreview">
            <img id="previewImg">
            <div class="remove-image" id="removeImage">×</div>
        </div>
    </div>

    <script>
        // Konfigurasi
        const API_BASE = 'https://bai-rho.vercel.app';
        let currentSessionId = null;
        let currentImageUrl = null;
        let isLoading = false;

        // DOM Elements
        const chatContainer = document.getElementById('chatContainer');
        const messagesDiv = document.getElementById('messages');
        const welcomeDiv = document.getElementById('welcome');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const imageBtn = document.getElementById('imageBtn');
        const previewDiv = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const removeImage = document.getElementById('removeImage');
        const uploadStatus = document.getElementById('uploadStatus');
        const historyList = document.getElementById('historyList');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuBtn = document.getElementById('menuBtn');
        const closeSidebar = document.getElementById('closeSidebar');
        const newChatBtn = document.getElementById('newChatBtn');
        const newChatSidebar = document.getElementById('newChatSidebar');

        // ============ UTILITY ============
        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
                .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: var(--accent);">$1</a>');
        }

        function addCopyBtn(element) {
            if (element.querySelector('.copy-btn')) return;
            const btn = document.createElement('div');
            btn.className = 'copy-btn';
            btn.innerHTML = '<i class="far fa-copy"></i> Salin';
            btn.onclick = () => {
                navigator.clipboard.writeText(element.innerText);
                btn.innerHTML = '<i class="fas fa-check"></i> Tersalin!';
                setTimeout(() => btn.innerHTML = '<i class="far fa-copy"></i> Salin', 2000);
            };
            element.appendChild(btn);
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ============ UPLOAD IMAGE ============
        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            uploadStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            
            try {
                const response = await fetch('https://api.baguss.xyz/api/tools/tourl', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.status && result.result?.url) {
                    uploadStatus.innerHTML = '<i class="fas fa-check-circle" style="color: #4ade80;"></i> Upload berhasil!';
                    setTimeout(() => uploadStatus.innerHTML = '', 2000);
                    return result.result.url;
                }
                throw new Error('Upload failed');
            } catch (error) {
                uploadStatus.innerHTML = '<i class="fas fa-exclamation-circle" style="color: #ff4d4d;"></i> Gagal upload';
                setTimeout(() => uploadStatus.innerHTML = '', 3000);
                return null;
            }
        }

        imageBtn.onclick = () => fileInput.click();
        
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const url = await uploadImage(file);
                if (url) {
                    currentImageUrl = url;
                    previewImg.src = url;
                    previewDiv.style.display = 'block';
                    scrollToBottom();
                }
            }
        };
        
        removeImage.onclick = () => {
            currentImageUrl = null;
            fileInput.value = '';
            previewDiv.style.display = 'none';
        };

        // ============ SESSION ============
        async function createSession() {
            try {
                const res = await fetch(`${API_BASE}/v1/session/create`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    currentSessionId = data.sessionId;
                    window.history.pushState({}, '', `/${currentSessionId}`);
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Create session error:', error);
                return false;
            }
        }

        async function loadSession(sessionId) {
            try {
                const res = await fetch(`${API_BASE}/v1/session/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId })
                });
                const data = await res.json();
                
                if (data.success && data.data) {
                    currentSessionId = sessionId;
                    const history = data.data.history || [];
                    
                    messagesDiv.innerHTML = '';
                    messagesDiv.style.display = 'flex';
                    welcomeDiv.style.display = 'none';
                    
                    for (const msg of history) {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = `message ${msg.role === 'user' ? 'user-message' : 'ai-message'}`;
                        
                        if (msg.role === 'assistant') {
                            const content = document.createElement('div');
                            content.innerHTML = formatText(msg.text);
                            messageDiv.appendChild(content);
                            addCopyBtn(content);
                        } else {
                            let text = msg.text || '';
                            if (msg.image) text = `📷 ${text}`;
                            messageDiv.innerText = text || 'Mengirim gambar';
                        }
                        messagesDiv.appendChild(messageDiv);
                    }
                    
                    scrollToBottom();
                    saveToLocalHistory(sessionId, history[0]?.text || 'Chat');
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Load session error:', error);
                return false;
            }
        }

        // ============ SEND MESSAGE ============
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message && !currentImageUrl) return;
            
            if (isLoading) return;
            isLoading = true;
            sendBtn.disabled = true;
            
            // Hide welcome
            if (welcomeDiv.style.display !== 'none') {
                welcomeDiv.style.display = 'none';
                messagesDiv.style.display = 'flex';
            }
            
            // Add user message
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'message user-message';
            let userText = message || '';
            if (currentImageUrl) userText = `${userText} 📷`.trim();
            userMsgDiv.innerText = userText || 'Mengirim gambar';
            messagesDiv.appendChild(userMsgDiv);
            
            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            const imageToSend = currentImageUrl;
            currentImageUrl = null;
            previewDiv.style.display = 'none';
            fileInput.value = '';
            
            scrollToBottom();
            
            // Add typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai-message';
            typingDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
            
            try {
                if (!currentSessionId) await createSession();
                
                const payload = { sessionId: currentSessionId, message: message || "Apa yang ada di gambar ini?" };
                if (imageToSend) payload.image = imageToSend;
                
                const res = await fetch(`${API_BASE}/v1/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                typingDiv.remove();
                
                if (data.success) {
                    const aiMsgDiv = document.createElement('div');
                    aiMsgDiv.className = 'message ai-message';
                    const content = document.createElement('div');
                    content.innerHTML = formatText(data.response);
                    aiMsgDiv.appendChild(content);
                    messagesDiv.appendChild(aiMsgDiv);
                    addCopyBtn(content);
                    
                    saveToLocalHistory(currentSessionId, message || 'Chat');
                } else {
                    throw new Error(data.error || 'Gagal');
                }
            } catch (error) {
                typingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message ai-message';
                errorDiv.innerText = `Maaf, error: ${error.message}`;
                messagesDiv.appendChild(errorDiv);
            }
            
            isLoading = false;
            sendBtn.disabled = false;
            scrollToBottom();
        }

        // ============ HISTORY ============
        function saveToLocalHistory(sessionId, title) {
            let history = JSON.parse(localStorage.getItem('bagus_sessions') || '[]');
            if (!history.find(h => h.id === sessionId)) {
                history.unshift({ id: sessionId, title: title.substring(0, 30), time: Date.now() });
                history = history.slice(0, 20);
                localStorage.setItem('bagus_sessions', JSON.stringify(history));
                renderHistory();
            }
        }
        
        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('bagus_sessions') || '[]');
            historyList.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span style="flex:1;">${item.title}</span>
                    <i class="fas fa-trash delete-history" data-id="${item.id}"></i>
                `;
                div.querySelector('span').onclick = () => window.location.href = `/${item.id}`;
                div.querySelector('.delete-history').onclick = (e) => {
                    e.stopPropagation();
                    let h = JSON.parse(localStorage.getItem('bagus_sessions') || '[]');
                    h = h.filter(x => x.id !== item.id);
                    localStorage.setItem('bagus_sessions', JSON.stringify(h));
                    renderHistory();
                };
                historyList.appendChild(div);
            });
        }
        
        // ============ NEW SESSION ============
        async function newSession() {
            const success = await createSession();
            if (success) {
                messagesDiv.innerHTML = '';
                messagesDiv.style.display = 'none';
                welcomeDiv.style.display = 'flex';
                messageInput.value = '';
                currentImageUrl = null;
                previewDiv.style.display = 'none';
                fileInput.value = '';
            }
        }
        
        // ============ INIT ============
        async function init() {
            const pathId = window.location.pathname.split('/')[1];
            
            if (pathId && /^[a-z0-9]{15}$/.test(pathId)) {
                const loaded = await loadSession(pathId);
                if (!loaded) await createSession();
            } else {
                await createSession();
            }
            
            renderHistory();
            
            setTimeout(() => {
                const preloader = document.getElementById('preloader-overlay');
                if (preloader) preloader.remove();
            }, 500);
        }
        
        // ============ EVENT LISTENERS ============
        sendBtn.onclick = sendMessage;
        newChatBtn.onclick = newSession;
        newChatSidebar.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); newSession(); };
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        document.querySelectorAll('.suggestion-card').forEach(card => {
            card.onclick = () => {
                messageInput.value = card.getAttribute('data-msg');
                sendMessage();
            };
        });
        
        // Sidebar
        menuBtn.onclick = () => { sidebar.classList.add('open'); overlay.classList.add('show'); };
        closeSidebar.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); };
        overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); };
        
        // Theme
        const themeBtn = document.getElementById('themeBtn');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeBtn.className = theme === 'dark' ? 'fas fa-sun icon-btn' : 'fas fa-moon icon-btn';
            localStorage.setItem('theme', theme);
        }
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);
        themeBtn.onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        };
        
        // Typing animation
        const words = ['Bagus!', 'Sob!', 'Kreator!', 'Coder!'];
        let i = 0, j = 0, isDeleting = false;
        function typeEffect() {
            const current = words[i];
            const el = document.getElementById('typer');
            if (!el) return;
            if (isDeleting) {
                el.innerText = current.substring(0, j--);
            } else {
                el.innerText = current.substring(0, j++);
            }
            let speed = isDeleting ? 80 : 150;
            if (!isDeleting && j === current.length) {
                isDeleting = true;
                speed = 2000;
            } else if (isDeleting && j === 0) {
                isDeleting = false;
                i = (i + 1) % words.length;
                speed = 500;
            }
            setTimeout(typeEffect, speed);
        }
        typeEffect();
        
        init();
    </script>
</body>
</html>
