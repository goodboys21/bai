<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Bagus Ai</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
    --bg-color: #ffffff;
    --text-color: #1a1a1a;
    --sidebar-bg: #f5f5f7;
    --card-bg: #f0f0f2;
    --border-color: #ddd;
    --input-bg: #f0f0f2;
    --icon-color: #555;
    --theme-icon: #f59e0b;
    --user-bubble: #e3f2fd;
    --ai-bubble: #f1f1f1;
    --shadow: rgba(0,0,0,0.05);
    --accent-color: #8b8bff;
    --code-bg: #f6f8fa;      /* Light mode: background abu-abu muda */
    --code-text: #24292e;    /* Light mode: teks gelap */
}

[data-theme="dark"] {
    --bg-color: #0a0a0a;
    --text-color: white;
    --sidebar-bg: #0f0f12;
    --card-bg: #1e1e1e;
    --border-color: #333;
    --input-bg: #1e1e1e;
    --icon-color: #888;
    --theme-icon: #a78bfa;
    --user-bubble: #0b3d91;
    --ai-bubble: #262626;
    --shadow: rgba(0,0,0,0.3);
    --accent-color: #a78bfa;
    --code-bg: #1e1e2e;      /* Dark mode: background gelap kebiruan */
    --code-text: #e4e4e7;    /* Dark mode: teks terang */
}

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100%; width: 100%;
            overflow: hidden; 
            position: fixed; left: 0; top: 0;
        }

        #preloader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }

        .loader {
            position: relative; width: 3.5em; height: 3.5em;
            transform: rotate(165deg); margin-bottom: 25px;
        }

        .loader:before, .loader:after {
            content: ""; position: absolute; top: 50%; left: 50%; display: block;
            width: 0.6em; height: 0.6em; border-radius: 0.3em; transform: translate(-50%, -50%);
        }

        .loader:before { animation: before8 2s infinite; }
        .loader:after { animation: after6 2s infinite; }

        @keyframes before8 {
            0% { width: 0.6em; box-shadow: 1.2em -0.6em rgba(225, 20, 98, 0.75), -1.2em 0.6em rgba(111, 202, 220, 0.75); }
            35% { width: 3.5em; box-shadow: 0 -0.6em rgba(225, 20, 98, 0.75), 0 0.6em rgba(111, 202, 220, 0.75); }
            70% { width: 0.6em; box-shadow: -1.2em -0.6em rgba(225, 20, 98, 0.75), 1.2em 0.6em rgba(111, 202, 220, 0.75); }
            100% { box-shadow: 1.2em -0.6em rgba(225, 20, 98, 0.75), -1.2em 0.6em rgba(111, 202, 220, 0.75); }
        }

        @keyframes after6 {
            0% { height: 0.6em; box-shadow: 0.6em 1.2em rgba(61, 184, 143, 0.75), -0.6em -1.2em rgba(233, 169, 32, 0.75); }
            35% { height: 3.5em; box-shadow: 0.6em 0 rgba(61, 184, 143, 0.75), -0.6em 0 rgba(233, 169, 32, 0.75); }
            70% { height: 0.6em; box-shadow: 0.6em -1.2em rgba(61, 184, 143, 0.75), -0.6em 1.2em rgba(233, 169, 32, 0.75); }
            100% { box-shadow: 0.6em 1.2em rgba(61, 184, 143, 0.75), -0.6em -1.2em rgba(233, 169, 32, 0.75); }
        }

        .loading-text { font-size: 14px; letter-spacing: 2px; opacity: 0.8; }

        #content-ready {
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
            filter: blur(20px); transition: filter 1s ease;
            position: relative;
        }

        header {
            flex-shrink: 0; height: 60px; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-color); z-index: 2000; border-bottom: 1px solid var(--border-color);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-logo-text { font-weight: 700; font-size: 18px; }
        .header-actions { display: flex; align-items: center; gap: 18px; }
        .burger-btn, .theme-toggle, .new-chat-btn { cursor: pointer; font-size: 20px; color: var(--icon-color); }

        #sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: var(--sidebar-bg); z-index: 4000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color);
        }
        #sidebar.open { left: 0; }
        #overlay-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; z-index: 3500; 
            opacity: 0; transition: opacity 0.3s ease;
        }

        .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
        .sidebar-logo { background: #2a2a3c; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--accent-color); font-size: 20px; }
        .menu-label { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; margin: 15px 0 10px 0; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: var(--text-color); font-size: 14px; margin-bottom: 4px; }
        .menu-item.active { background: rgba(139, 139, 255, 0.15); color: var(--accent-color); font-weight: 500; }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 10px; 
            font-size: 14px;
            cursor: pointer;
        }
        .history-item:hover {
            background: rgba(139, 139, 255, 0.1);
        }
        .history-item.active {
            background: rgba(139, 139, 255, 0.2);
            border-left: 3px solid var(--accent-color);
        }
        .history-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .trash-btn { 
            color: #ff4d4d !important; 
            cursor: pointer; 
            padding: 5px;
            opacity: 0.6;
        }
        .trash-btn:hover {
            opacity: 1;
        }

        #app-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; display: flex; flex-direction: column; position: relative; }
        
        .welcome-view { 
            width: 100%; max-width: 450px; text-align: center; margin: auto; 
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            transition: transform 0.4s ease, opacity 0.4s ease; 
        }
        h1 { font-size: 32px; font-weight: bold; min-height: 40px; }
        .sob-container { color: #f472b6; border-right: 3px solid var(--accent-color); animation: blink 0.7s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }

        .suggestion-list { width: 100%; display: flex; flex-direction: column; gap: 12px; transition: 0.4s ease; }
        .suggestion-list.hide { transform: translateY(20px); opacity: 0; pointer-events: none; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 15px; font-size: 14px; text-align: left; cursor: pointer; box-shadow: 0 2px 4px var(--shadow); width: 100%; }

        #chat-window { width: 100%; max-width: 700px; margin: 0 auto; display: none; flex-direction: column; gap: 15px; padding-bottom: 10px; }
        
        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            animation: fadeSlideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-bubble { align-self: flex-end; background-color: var(--user-bubble); border-bottom-right-radius: 4px; }
        .ai-bubble { align-self: flex-start; background-color: var(--ai-bubble); border-bottom-left-radius: 4px; }

        /* MARKDOWN STYLES - VERSION PREMIUM */
.ai-bubble .message-text {
    word-wrap: break-word;
    line-height: 1.6;
    font-size: 15px;
}

/* Custom list untuk format : (titik dua) */
.ai-bubble .colon-list {
    list-style-type: none;
    padding-left: 0;
    margin: 0.6em 0;
}

.ai-bubble .colon-list li {
    position: relative;
    padding-left: 1.5em;
    margin: 0.3em 0;
    line-height: 1.5;
}

.ai-bubble .colon-list li::before {
    content: "•";
    color: var(--accent-color);
    position: absolute;
    left: 0;
    font-weight: bold;
    font-size: 1.2em;
}

/* Headings - Ukuran SAMA KAYAK TEKS BIASA (1em = 15px) */
.ai-bubble h1 { 
    font-size: 1.1em; 
    margin: 0.8em 0 0.4em; 
    font-weight: 600; 
    border-bottom: 2px solid var(--accent-color); 
    padding-bottom: 0.3em;
    letter-spacing: -0.01em;
}
.ai-bubble h2 { 
    font-size: 1.05em; 
    margin: 0.7em 0 0.3em; 
    font-weight: 600; 
    border-bottom: 1px solid var(--border-color); 
    padding-bottom: 0.2em;
}
.ai-bubble h3 { 
    font-size: 1em; 
    margin: 0.6em 0 0.2em; 
    font-weight: 600; 
}
.ai-bubble h4 { 
    font-size: 0.95em; 
    margin: 0.5em 0 0.2em; 
    font-weight: 600; 
}
.ai-bubble h5, .ai-bubble h6 { 
    font-size: 0.9em; 
    margin: 0.4em 0 0.2em; 
    font-weight: 600; 
}

/* Bold & Italic */
.ai-bubble strong { 
    font-weight: 700; 
    color: var(--accent-color); 
}
.ai-bubble em { 
    font-style: italic; 
}

/* Lists - Rapi dan Berjarak */
.ai-bubble ul, .ai-bubble ol { 
    margin: 0.6em 0; 
    padding-left: 1.8em; 
}
.ai-bubble li { 
    margin: 0.3em 0; 
    line-height: 1.5;
}
.ai-bubble ul { 
    list-style-type: disc; 
}
.ai-bubble ol { 
    list-style-type: decimal; 
}
.ai-bubble ul ul, .ai-bubble ol ul {
    list-style-type: circle;
    margin: 0.2em 0;
}

/* Blockquote - Kayak ChatGPT */
.ai-bubble blockquote {
    border-left: 4px solid var(--accent-color);
    margin: 0.8em 0;
    padding: 0.6em 1em;
    background: rgba(139, 139, 255, 0.08);
    border-radius: 0 12px 12px 0;
    font-style: normal;
    color: var(--text-color);
    opacity: 0.9;
}

/* TABEL - KAYAK GEMINI/DEEPSEEK (FIXED) */
.ai-bubble table {
    border-collapse: collapse;
    margin: 1em 0;
    width: 100%;
    overflow-x: auto;
    display: block;
    border-radius: 12px;
    font-size: 14px;
    border: 1px solid var(--border-color);
}

.ai-bubble table thead {
    background: rgba(139, 139, 255, 0.15);
}

.ai-bubble th, .ai-bubble td {
    border: 1px solid var(--border-color);
    padding: 10px 14px;
    text-align: left;
    vertical-align: top;
}

.ai-bubble th {
    background: rgba(139, 139, 255, 0.2);
    font-weight: 600;
    color: var(--accent-color);
}

/* Alternating row colors untuk tabel */
.ai-bubble tbody tr:nth-child(even) {
    background: rgba(139, 139, 255, 0.05);
}

.ai-bubble tbody tr:hover {
    background: rgba(139, 139, 255, 0.1);
    transition: background 0.2s;
}

/* Code Block - Modern Style */
.ai-bubble pre {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 1em;
    border-radius: 12px;
    overflow-x: auto;
    margin: 1em 0;
    position: relative;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid var(--border-color);
}

.ai-bubble code {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.9em;
}

/* Inline code - Soft Background */
.ai-bubble :not(pre) > code {
    background: rgba(139, 139, 255, 0.12);
    padding: 0.2em 0.5em;
    border-radius: 6px;
    font-size: 0.85em;
    color: var(--accent-color);
    font-weight: 500;
}

/* Code block wrapper dengan tombol copy */
.code-block-wrapper {
    position: relative;
    margin: 1em 0;
}

.code-block-wrapper pre {
    margin: 0;
    padding-right: 70px;
}

.code-copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(100, 100, 100, 0.3);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text-color);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: monospace;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 6px;
}

.code-copy-btn:hover {
    background: var(--accent-color);
    color: white;
    border-color: var(--accent-color);
}

/* Horizontal rule */
.ai-bubble hr {
    border: none;
    border-top: 2px solid var(--border-color);
    margin: 1.5em 0;
    background: none;
}

/* Links */
.ai-bubble a {
    color: var(--accent-color);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
}

.ai-bubble a:hover {
    border-bottom-color: var(--accent-color);
}

/* Images */
.ai-bubble img {
    max-width: 100%;
    border-radius: 12px;
    margin: 0.8em 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Paragraph spacing */
.ai-bubble p {
    margin: 0.6em 0;
}

/* Small text */
.ai-bubble small {
    font-size: 0.85em;
    opacity: 0.8;
}

.typing-dots {
    display: flex;
    gap: 6px;
    padding: 8px 0;
    align-items: center;
}

.typing-dots .dot {
    width: 8px;
    height: 8px;
    background: var(--icon-color);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite ease-in-out;
}

.typing-dots .dot:nth-child(1) { animation-delay: 0s; }
.typing-dots .dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dots .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
    0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
    }
    30% {
        transform: translateY(-8px);
        opacity: 1;
    }
}

.copy-btn { 
    position: absolute; 
    bottom: 8px; 
    left: 16px; 
    font-size: 11px; 
    cursor: pointer; 
    opacity: 0.6; 
    display: flex; 
    align-items: center; 
    gap: 5px; 
}

.copy-btn:hover { opacity: 1; }

.chat-image-container {
    margin-top: 8px;
    position: relative;
    display: inline-block;
    width: 200px;
    height: 200px;
    border-radius: 16px;
    overflow: hidden;
    background: var(--card-bg);
    cursor: pointer;
}

.chat-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.2s;
}

.chat-image:hover {
    transform: scale(1.02);
}

.message-with-image {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.image-preview-container {
    position: relative;
    width: 70px;
    height: 70px;
    border-radius: 12px;
    overflow: visible;
    background: var(--card-bg);
    margin-bottom: 8px;
    display: inline-block;
    border: 2px solid var(--accent-color);
}

.image-preview-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
}

.remove-img-btn {
    position: absolute;
    top: -12px;
    right: -12px;
    background: #ff4d4d;
    color: white;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border: 2px solid var(--bg-color);
    z-index: 20;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    transition: transform 0.2s, background 0.2s;
}

.remove-img-btn:hover {
    transform: scale(1.1);
    background: #ff3333;
}

.preview-area {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    align-items: center;
}

footer { flex-shrink: 0; padding: 10px 15px; background-color: var(--bg-color); z-index: 2000; border-top: 1px solid var(--border-color); }
.input-box { width: 100%; max-width: 500px; margin: 0 auto; background: var(--input-bg); border-radius: 24px; padding: 8px 16px; border: 1px solid var(--border-color); }
.input-row { display: flex; align-items: flex-end; gap: 12px; width: 100%; }

textarea {
    background: transparent; border: none; outline: none; color: var(--text-color); 
    flex: 1; font-size: 16px; padding: 10px 0; resize: none; max-height: 150px;
    line-height: 1.5; overflow-y: auto;
}

.icon-btn { 
    color: var(--icon-color); 
    cursor: pointer; 
    font-size: 18px; 
    margin-bottom: 10px;
    transition: transform 0.2s;
}

.icon-btn:hover {
    transform: scale(1.05);
}

.send-btn-active {
    color: var(--accent-color) !important;
}

.stop-btn {
    color: #ff4d4d !important;
}

#inner-preview { display: none; }

.image-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 10000;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}
.image-modal img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border-radius: 8px;
}
    </style>
</head>
<body>

    <div id="preloader-overlay"><div class="loader"></div><div class="loading-text">Loading...</div></div>

    <div id="content-ready">
        <div id="overlay-bg"></div>
        <div id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="fa-solid fa-microchip"></i></div>
                <span style="font-weight: 700; font-size: 18px;">Bagus Ai<span style="color:var(--accent-color);">.</span></span>
            </div>
            <p class="menu-label">Platform</p>
            <div class="menu-item" data-page="chat">
                <i class="fa-regular fa-comment-dots"></i> Chat AI
            </div>
            <div class="menu-item" data-page="create">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Create Image
            </div>
            <div class="menu-item" data-page="edit">
                <i class="fa-solid fa-paintbrush"></i> Edit Image
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px;">
                <p class="menu-label" style="margin: 0;">History</p>
                <i class="fa-solid fa-plus" style="color:var(--accent-color); cursor:pointer;" id="new-history-btn"></i>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>

        <header id="main-header">
            <div class="header-left">
                <i class="fa-solid fa-bars burger-btn" id="burger-trigger"></i>
                <span class="header-logo-text">Bagus Ai<span style="color:var(--accent-color);">.</span></span>
            </div>
            <div class="header-actions">
                <i class="fa-regular fa-pen-to-square new-chat-btn" id="new-session-btn" title="New Chat"></i>

        <div id="app-container">

            <div class="input-box">

        <img id="modalImage" src="">

<script>
    // ============ MARKDOWN RENDERER ============
    // ============ MARKDOWN RENDERER ============

function parseMarkdown(text) {
    if (!text) return '';
    
    let html = text;
    
    // Bersihin tabel kosong & list dengan *
    html = html.replace(/\n?\|[\s\|]*\|\n?/g, '\n');
    html = html.replace(/\n?\|[-:\| ]+\|\n?/g, '\n');
    html = html.replace(/^\* /gm, '- ');
    
    // 1. Code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
        const language = lang || 'plaintext';
        const escapedCode = escapeHtmlSimple(code.trim());
        return `<div class="code-block-wrapper"><pre><code class="language-${language}">${escapedCode}</code></pre><button class="code-copy-btn" onclick="copyCodeBlock(this)"><i class="fa-regular fa-copy"></i> Salin</button></div>`;
    });
    
    // 2. Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    
    // 3. Bold
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    
    // 4. Italic
    html = html.replace(/(?<!-) \*([^*]+)\*/g, '<em>$1</em>');
    
    // 5. Headings
    html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
    
    // 6. Blockquote
    html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
    
    // 7. Unordered lists
    let ulMatch = html.match(/(?:^- (.*$)\n?)+/gm);
    if (ulMatch) {
        ulMatch.forEach(match => {
            const items = match.match(/^- (.*$)/gm).map(item => `<li>${item.replace(/^- /, '')}</li>`).join('');
            html = html.replace(match, `<ul>${items}</ul>`);
        });
    }
    
    // 8. Ordered lists
    let olMatch = html.match(/(?:^\d+\. (.*$)\n?)+/gm);
    if (olMatch) {
        olMatch.forEach(match => {
            const items = match.match(/^\d+\. (.*$)/gm).map(item => `<li>${item.replace(/^\d+\. /, '')}</li>`).join('');
            html = html.replace(match, `<ol>${items}</ol>`);
        });
    }
    
    // 9. Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    
    // 10. Images
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    
    // 11. TABEL - FIXED (support format tanpa | di pemisah)
    const tableRegex = /\n(\|?.+\|?)\n(\|?[-:\| ]+\|?)\n((?:\|?.+\|?\n?)+)/g;
    html = html.replace(tableRegex, (match, headerRow, separatorRow, bodyRows) => {
        // Bersihin header
        let cleanHeader = headerRow.replace(/^\|/, '').replace(/\|$/, '');
        const headers = cleanHeader.split('|').map(cell => cell.trim()).filter(cell => cell);
        if (headers.length === 0) return '';
        
        const headerHtml = `<thead>\\n${headers.map(h => `<th>${h}</th>`).join('')}\\n</thead>`;
        
        // Bersihin body rows
        const rows = bodyRows.trim().split('\n');
        const bodyHtml = rows.map(row => {
            let cleanRow = row.replace(/^\|/, '').replace(/\|$/, '');
            const cells = cleanRow.split('|').map(cell => cell.trim()).filter(cell => cell);
            if (cells.length === 0) return '';
            return ` <tr>\\n${cells.map(c => `<td>${c}</td>`).join('')}\\n</tr>`;
        }).join('');
        
        if (bodyHtml === '') return '';
        
        return `<table>\\n${headerHtml}<tbody>\\n${bodyHtml}\\n</tbody>\\n</table>`;
    });
    
    // 12. Horizontal rule
    html = html.replace(/^---$/gm, '<hr>');
    
    // 13. Newlines to <br>
    html = html.replace(/\n/g, '<br>');
    
    // 14. Cleanup
    html = html.replace(/<br>\s*<(ul|ol|table|blockquote|h1|h2|h3|pre)/g, '<$1');
    html = html.replace(/<\/(ul|ol|table|blockquote|h1|h2|h3|pre)><br>/g, '</$1>');
    
    return html;
}

function copyCodeBlock(btn) {
    const pre = btn.parentElement.querySelector('pre code');
    const code = pre ? pre.innerText : '';
    navigator.clipboard.writeText(code).then(() => {
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
        setTimeout(() => {
            btn.innerHTML = originalHtml;
        }, 2000);
    });
}

    const input = document.getElementById('chat-input');

    // Upload gambar
    async function uploadImageToUrl(imageFile) {
        const formData = new FormData();
        formData.append('file', imageFile);
        try {
            const response = await fetch('https://api.baguss.xyz/api/tools/tourl', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.status && result.result && result.result.url) {
                return result.result.url;
            } else {
                throw new Error('Upload gagal');
            }
        } catch (error) {
            console.error('Error uploading image:', error);
            throw error;
        }
    }
    
    // Create session
    async function createNewSession() {
        try {
            const response = await fetch('https://bai-rho.vercel.app/v1/session/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();
            if (result.success && result.sessionId) {
                return result.sessionId;
            } else {
                throw new Error('Gagal membuat session');
            }
        } catch (error) {
            console.error('Error creating session:', error);
            throw error;
        }
    }
    
    function showWelcomeView() {

        chatWindow.style.display = 'none';
        welcomeView.style.display = 'flex';
        welcomeView.style.opacity = '1';
        welcomeView.style.transform = 'translateY(0)';
        bubbleWrap.classList.remove('hide');
        chatWindow.innerHTML = '';
        forceScroll();
    }
    
    async function loadSessionFromApi(sessionId) {
        try {
            chatWindow.innerHTML = '<div class="bubble ai-bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div style="margin-top: 5px; font-size: 12px;">Memuat percakapan...</div></div>';
            chatWindow.style.display = 'flex';
            welcomeView.style.display = 'none';
            isChatStarted = true;

            const response = await fetch('https://bai-rho.vercel.app/v1/session/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            });

            if (!response.ok) throw new Error('Gagal memuat sesi');
            const result = await response.json();
            
            const messages = result.data?.history || [];
            
            if (messages.length === 0) {
                showWelcomeView();
                currentSessionId = sessionId;
                localStorage.setItem('bagus_ai_session', currentSessionId);
                renderHistory();
                highlightActiveSession(sessionId);
                return;
            }
            
            chatWindow.innerHTML = '';
            currentSessionId = sessionId;
            localStorage.setItem('bagus_ai_session', currentSessionId);
            
            updateLocalHistory(sessionId, messages);
            renderHistory();
            highlightActiveSession(sessionId);
            
            for (let i = 0; i < messages.length; i++) {
                const msg = messages[i];
                const bubble = document.createElement('div');
                bubble.className = `bubble ${msg.role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message-with-image';
                
                if (msg.role === 'assistant' || msg.role === 'bot' || msg.role === 'ai') {
                    if (msg.text) {
                        const textSpan = document.createElement('div');
                        textSpan.className = 'message-text';
                        textSpan.innerHTML = formatAiResponse(msg.text);
                        messageDiv.appendChild(textSpan);
                    }
                    if (msg.image) {
                        messageDiv.appendChild(createImageContainer(msg.image));
                    }
                    bubble.appendChild(messageDiv);
                    chatWindow.appendChild(bubble);
                } else if (msg.role === 'user') {
                    if (msg.text) {
                        const textSpan = document.createElement('div');
                        textSpan.className = 'message-text';
                        textSpan.innerText = msg.text;
                        messageDiv.appendChild(textSpan);
                    }
                    if (msg.image) {
                        messageDiv.appendChild(createImageContainer(msg.image));
                    }
                    bubble.appendChild(messageDiv);
                    chatWindow.appendChild(bubble);
                }
                forceScroll();
                await delay(100);
            }
            forceScroll();
        } catch (error) {
            console.error('Error loading session:', error);
            showWelcomeView();
            currentSessionId = sessionId;
            localStorage.setItem('bagus_ai_session', currentSessionId);
            renderHistory();
            highlightActiveSession(sessionId);
        }
    }
    
    function updateLocalHistory(sessionId, messages) {
        let history = JSON.parse(localStorage.getItem('bagus_ai_history')) || [];
        const existingIndex = history.findIndex(h => h.sessionId === sessionId);
        
        if (existingIndex === -1 && messages.length > 0) {
            const firstUserMsg = messages.find(m => m.role === 'user');
            const title = firstUserMsg ? firstUserMsg.text.substring(0, 25) + (firstUserMsg.text.length > 25 ? '...' : '') : "Percakapan Baru";
            history.unshift({ title: title, sessionId: sessionId, timestamp: new Date().toISOString() });
            localStorage.setItem('bagus_ai_history', JSON.stringify(history));
        }
    }
    
    function createImageContainer(imageUrl) {
        const imgContainer = document.createElement('div');
        imgContainer.className = 'chat-image-container';
        imgContainer.onclick = () => openImageModal(imageUrl);
        const img = document.createElement('img');
        img.className = 'chat-image';
        img.src = imageUrl;
        img.alt = 'Gambar';
        imgContainer.appendChild(img);
        return imgContainer;
    }
    
    function highlightActiveSession(sessionId) {
        document.querySelectorAll('.history-item').forEach(item => {
            if (item.dataset.sessionId === sessionId) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
    
    function renderHistory() {
        historyList.innerHTML = '';
        let history = JSON.parse(localStorage.getItem('bagus_ai_history')) || [];
        if (history.length === 0) {
            historyList.innerHTML = '<div style="padding: 12px; text-align: center; color: var(--icon-color); font-size: 12px;">Belum ada riwayat chat</div>';
            return;
        }
        history.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (currentSessionId === item.sessionId) div.classList.add('active');
            div.dataset.sessionId = item.sessionId;
            div.innerHTML = `
                <span class="history-title" onclick="loadSession('${item.sessionId}')">${escapeHtmlSimple(item.title)}</span>
                <i class="fa-regular fa-trash-can trash-btn" onclick="deleteHistory(event, '${item.sessionId}', ${index})"></i>
            `;
            historyList.appendChild(div);
        });
    }
    
    function escapeHtmlSimple(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function deleteHistory(event, sessionId, index) {
        event.stopPropagation();
        let history = JSON.parse(localStorage.getItem('bagus_ai_history')) || [];
        history.splice(index, 1);
        localStorage.setItem('bagus_ai_history', JSON.stringify(history));
        
        if (currentSessionId === sessionId) {
            createNewSessionAndRedirect();
        } else {
            renderHistory();
        }
    }
    
    async function createNewSessionAndRedirect() {
        try {
            const newSessionId = await createNewSession();
            window.location.href = `/${newSessionId}`;
        } catch (error) {
            console.error('Gagal buat session baru:', error);
        }
    }
    
    function loadSession(sid) {
        if (sid !== currentSessionId) {
            window.location.href = `/${sid}`;
        }

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function addCopyBtn(bubbleElement) {

    function stopGenerating() {
        if (currentAbortController) {
            currentAbortController.abort();

        }
        isGenerating = false;
        
        sendBtn.className = 'fa-solid fa-paper-plane icon-btn';
        sendBtn.style.color = 'var(--accent-color)';

        }

    async function sendMessage() {
        if (isGenerating) {
            stopGenerating();
            return;
        }
        
        const val = input.value.trim();
        const hasImage = pendingImageFile !== null;
        
        if (!val && !hasImage) return;
        if (!currentSessionId) return;
        
        if (!isChatStarted) {
            isChatStarted = true;
            welcomeView.style.opacity = '0';
            setTimeout(() => { 
                welcomeView.style.display = 'none'; 
                chatWindow.style.display = 'flex'; 
            }, 400);
        }
        
        const uB = document.createElement('div');
        uB.className = 'bubble user-bubble';
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message-with-image';
        
        if (val) {
            const textSpan = document.createElement('div');
            textSpan.className = 'message-text';
            textSpan.innerText = val;
            messageDiv.appendChild(textSpan);
        }
        
        if (pendingImagePreview) {
            messageDiv.appendChild(createImageContainer(pendingImagePreview));
        }
        
        uB.appendChild(messageDiv);
        chatWindow.appendChild(uB);
        
        const textToSend = val;
        const imageFileToSend = pendingImageFile;
        
        input.value = '';
        input.style.height = 'auto';
        pendingImageFile = null;
        pendingImagePreview = null;
        innerPreview.innerHTML = '';
        innerPreview.style.display = 'none';
        fileInput.value = '';
        forceScroll();
        
        const aB = document.createElement('div');
        aB.className = 'bubble ai-bubble';
        aB.innerHTML = `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        chatWindow.appendChild(aB);
        forceScroll();
        
        sendBtn.className = 'fa-solid fa-stop icon-btn stop-btn';
        sendBtn.style.color = '#ff4d4d';
        isGenerating = true;
        currentAbortController = new AbortController();
        
        try {
            let imageUrl = null;
            if (imageFileToSend) {
                imageUrl = await uploadImageToUrl(imageFileToSend);
            }
            
            const payload = { 
                sessionId: currentSessionId, 
                message: textToSend || '' 
            };
            if (imageUrl) payload.image = imageUrl;
            
            const response = await fetch('https://bai-rho.vercel.app/v1/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                signal: currentAbortController.signal
            });
            
            const data = await response.json();
            
            aB.innerHTML = '';
            
            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.className = 'message-with-image';
            const textSpan = document.createElement('div');
            textSpan.className = 'message-text';
            aiMessageDiv.appendChild(textSpan);
            aB.appendChild(aiMessageDiv);
            
            const fullText = data.response;
            let currentText = '';
            for (let i = 0; i < fullText.length; i++) {
                if (!isGenerating) break;
                currentText += fullText[i];
                textSpan.innerHTML = formatAiResponse(currentText);
                forceScroll();
                await delay(15);
            }
            
            if (isGenerating) {
                textSpan.innerHTML = formatAiResponse(fullText);
            } else {
                if (currentText) {
                    textSpan.innerHTML = formatAiResponse(currentText + '...');
                }
            }
            
            let history = JSON.parse(localStorage.getItem('bagus_ai_history')) || [];
            if (!history.find(h => h.sessionId === currentSessionId)) {
                const title = textToSend ? textToSend.substring(0, 20) + (textToSend.length > 20 ? '...' : '') : 'Gambar';
                history.unshift({ title: title, sessionId: currentSessionId, timestamp: new Date().toISOString() });
                localStorage.setItem('bagus_ai_history', JSON.stringify(history));
                renderHistory();
            }
            highlightActiveSession(currentSessionId);
            forceScroll();
            
        } catch (error) {
            if (error.name === 'AbortError') {
                console.log('Request dibatalkan');
            } else {
                console.error('Send error:', error);
                aB.innerHTML = '<div class="message-with-image"><div class="message-text">⚠️ Waduh Sob, Bagus Ai lagi pusing. Coba ulangi sebentar ya!</div></div>';
            }
        } finally {
            isGenerating = false;
            currentAbortController = null;
            sendBtn.className = 'fa-solid fa-paper-plane icon-btn';
            sendBtn.style.color = 'var(--accent-color)';
        }
    }

    const phrases = ["Bagus!", "Sob!", "Kreator!"];
    let pIdx = 0, cIdx = 0, isDel = false;
    function type() {
        const cur = phrases[pIdx];
        const el = document.getElementById('typer');
        if(el) {
            el.innerText = isDel ? cur.substring(0, cIdx--) : cur.substring(0, cIdx++);
            let speed = isDel ? 100 : 200;
            if(!isDel && cIdx > cur.length) { isDel = true; speed = 2500; }
            else if(isDel && cIdx < 0) { isDel = false; pIdx = (pIdx + 1) % phrases.length; speed = 500; }
            setTimeout(type, speed);
        }
    }
    
    const themeBtn = document.getElementById('theme-btn');

    }

                innerPreview.style.display = 'block';
                forceScroll();
            };

    };
