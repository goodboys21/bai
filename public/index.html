<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Bagus Ai</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --sidebar-bg: #f5f5f7;
            --card-bg: #f0f0f2;
            --border-color: #ddd;
            --input-bg: #f0f0f2;
            --icon-color: #555;
            --theme-icon: #f59e0b;
            --user-bubble: #e3f2fd;
            --ai-bubble: #f1f1f1;
            --shadow: rgba(0,0,0,0.05);
            --accent-color: #8b8bff;
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --text-color: white;
            --sidebar-bg: #0f0f12;
            --card-bg: #1e1e1e;
            --border-color: #333;
            --input-bg: #1e1e1e;
            --icon-color: #888;
            --theme-icon: #a78bfa;
            --user-bubble: #0b3d91;
            --ai-bubble: #262626;
            --shadow: rgba(0,0,0,0.3);
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100%; width: 100%;
            overflow: hidden; 
            position: fixed; left: 0; top: 0;
        }

        #preloader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }

        .loader {
            position: relative; width: 3.5em; height: 3.5em;
            transform: rotate(165deg); margin-bottom: 25px;
        }

        .loader:before, .loader:after {
            content: ""; position: absolute; top: 50%; left: 50%; display: block;
            width: 0.6em; height: 0.6em; border-radius: 0.3em; transform: translate(-50%, -50%);
        }

        .loader:before { animation: before8 2s infinite; }
        .loader:after { animation: after6 2s infinite; }

        @keyframes before8 {
            0% { width: 0.6em; box-shadow: 1.2em -0.6em rgba(225, 20, 98, 0.75), -1.2em 0.6em rgba(111, 202, 220, 0.75); }
            35% { width: 3.5em; box-shadow: 0 -0.6em rgba(225, 20, 98, 0.75), 0 0.6em rgba(111, 202, 220, 0.75); }
            70% { width: 0.6em; box-shadow: -1.2em -0.6em rgba(225, 20, 98, 0.75), 1.2em 0.6em rgba(111, 202, 220, 0.75); }
            100% { box-shadow: 1.2em -0.6em rgba(225, 20, 98, 0.75), -1.2em 0.6em rgba(111, 202, 220, 0.75); }
        }

        @keyframes after6 {
            0% { height: 0.6em; box-shadow: 0.6em 1.2em rgba(61, 184, 143, 0.75), -0.6em -1.2em rgba(233, 169, 32, 0.75); }
            35% { height: 3.5em; box-shadow: 0.6em 0 rgba(61, 184, 143, 0.75), -0.6em 0 rgba(233, 169, 32, 0.75); }
            70% { height: 0.6em; box-shadow: 0.6em -1.2em rgba(61, 184, 143, 0.75), -0.6em 1.2em rgba(233, 169, 32, 0.75); }
            100% { box-shadow: 0.6em 1.2em rgba(61, 184, 143, 0.75), -0.6em -1.2em rgba(233, 169, 32, 0.75); }
        }

        .loading-text { font-size: 14px; letter-spacing: 2px; opacity: 0.8; }

        #content-ready {
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
            filter: blur(20px); transition: filter 1s ease;
            position: relative;
        }

        header {
            flex-shrink: 0; height: 60px; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-color); z-index: 2000; border-bottom: 1px solid var(--border-color);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-logo-text { font-weight: 700; font-size: 18px; }
        .header-actions { display: flex; align-items: center; gap: 18px; }
        .burger-btn, .theme-toggle, .new-chat-btn { cursor: pointer; font-size: 20px; color: var(--icon-color); }

        #sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: var(--sidebar-bg); z-index: 4000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color);
        }
        #sidebar.open { left: 0; }
        #overlay-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; z-index: 3500; 
            opacity: 0; transition: opacity 0.3s ease;
        }

        .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
        .sidebar-logo { background: #2a2a3c; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--accent-color); font-size: 20px; }
        .menu-label { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; margin: 15px 0 10px 0; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: var(--text-color); font-size: 14px; margin-bottom: 4px; }
        .menu-item.active { background: rgba(139, 139, 255, 0.15); color: var(--accent-color); font-weight: 500; }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 10px; font-size: 14px; cursor: pointer; }
        .history-item:hover { background: var(--card-bg); }
        .trash-btn { color: #ff4d4d !important; cursor: pointer; padding: 5px; }

        #app-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; display: flex; flex-direction: column; position: relative; }
        
        .welcome-view { 
            width: 100%; max-width: 450px; text-align: center; margin: auto; 
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        h1 { font-size: 32px; font-weight: bold; min-height: 40px; }
        .sob-container { color: #f472b6; border-right: 3px solid var(--accent-color); animation: blink 0.7s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }

        .suggestion-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 15px; font-size: 14px; text-align: left; cursor: pointer; box-shadow: 0 2px 4px var(--shadow); width: 100%; }

        #chat-window { width: 100%; max-width: 600px; margin: 0 auto; display: none; flex-direction: column; gap: 15px; padding-bottom: 10px; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; animation: bubblePop 0.3s ease-out; position: relative; }
        @keyframes bubblePop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .user-bubble { align-self: flex-end; background-color: var(--user-bubble); border-bottom-right-radius: 4px; }
        .ai-bubble { align-self: flex-start; background-color: var(--ai-bubble); border-bottom-left-radius: 4px; padding-bottom: 35px; }

        .copy-btn { position: absolute; bottom: 8px; left: 16px; font-size: 11px; cursor: pointer; opacity: 0.6; display: flex; align-items: center; gap: 5px; }
        .typing-dots { display: flex; gap: 4px; padding: 10px 0; }
        .dot { width: 6px; height: 6px; background: var(--icon-color); border-radius: 50%; animation: dotPulse 1s infinite alternate; }
        @keyframes dotPulse { from { opacity: 0.4; } to { opacity: 1; } }

        footer { flex-shrink: 0; padding: 10px 15px; background-color: var(--bg-color); z-index: 2000; border-top: 1px solid var(--border-color); }
        .input-box { width: 100%; max-width: 500px; margin: 0 auto; background: var(--input-bg); border-radius: 24px; padding: 8px 16px; border: 1px solid var(--border-color); }
        .input-row { display: flex; align-items: flex-end; gap: 12px; width: 100%; }
        
        textarea {
            background: transparent; border: none; outline: none; color: var(--text-color); 
            flex: 1; font-size: 16px; padding: 10px 0; resize: none; max-height: 150px;
            line-height: 1.5; overflow-y: auto;
        }

        .icon-btn { color: var(--icon-color); cursor: pointer; font-size: 18px; margin-bottom: 10px; }
        #inner-preview { display: none; margin-bottom: 8px; position: relative; width: 60px; height: 60px; }
        .preview-wrapper { width: 100%; height: 100%; position: relative; }
        .preview-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 1px solid var(--border-color); }
        .remove-img-btn { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: 2px solid var(--input-bg); }
        
        .upload-progress { font-size: 11px; color: var(--icon-color); margin-top: 4px; }
    </style>
</head>
<body>

    <div id="preloader-overlay"><div class="loader"></div><div class="loading-text">Loading Bagus Ai...</div></div>

    <div id="content-ready">
        <div id="overlay-bg"></div>
        <div id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="fa-solid fa-microchip"></i></div>
                <span style="font-weight: 700; font-size: 18px;">Bagus Ai<span style="color:var(--accent-color);">.</span></span>
            </div>
            <p class="menu-label">Menu</p>
            <div class="menu-item active"><i class="fa-regular fa-comment-dots"></i> Chat AI</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px;">
                <p class="menu-label" style="margin: 0;">History Session</p>
                <i class="fa-solid fa-plus" id="new-session-sidebar" style="color:var(--accent-color); cursor:pointer;"></i>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>

        <header id="main-header">
            <div class="header-left">
                <i class="fa-solid fa-bars burger-btn" id="burger-trigger"></i>
                <span class="header-logo-text">Bagus Ai<span style="color:var(--accent-color);">.</span></span>
            </div>
            <div class="header-actions">
                <i class="fa-regular fa-pen-to-square new-chat-btn" id="new-session-btn" title="New Chat"></i>
                <i class="fa-regular fa-sun theme-toggle" id="theme-btn"></i>
            </div>
        </header>

        <div id="app-container">
            <div class="welcome-view" id="welcome-view">
                <h1><span style="color:#60a5fa">Halo,</span> <span id="typer" class="sob-container"></span></h1>
                <div class="suggestion-list" id="bubble-wrap">
                    <div class="card" data-suggest="Buatkan API Node.js dengan Express">Buatkan API Node.js</div>
                    <div class="card" data-suggest="Jelaskan konsep Microservices secara sederhana">Jelaskan Microservices</div>
                    <div class="card" data-suggest="Berikan panduan keamanan web untuk pemula">Panduan Keamanan Web</div>
                    <div class="card" data-suggest="Apa itu AI dan bagaimana cara kerjanya?">Apa itu AI?</div>
                </div>
            </div>
            <div id="chat-window"></div>
        </div>

        <footer>
            <div class="input-box">
                <div id="inner-preview">
                    <div class="preview-wrapper">
                        <img id="image-preview" src="">
                        <div class="remove-img-btn" id="remove-img">×</div>
                    </div>
                </div>
                <div class="input-row">
                    <i class="fa-regular fa-image icon-btn" id="gallery-trigger"></i>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                    <textarea id="chat-input" placeholder="Ketik pesan atau tanya tentang gambar..." rows="1"></textarea>
                    <i class="fa-solid fa-paper-plane icon-btn" id="send-btn" style="color:var(--accent-color);"></i>
                </div>
                <div id="upload-status" class="upload-progress"></div>
            </div>
        </footer>
    </div>

<script>
    // ============ KONFIGURASI ============
    const API_BASE = 'https://bai-rho.vercel.app'; // Ganti dengan domain API lo
    let currentSessionId = null;
    let currentImageUrl = null;
    let isLoadingSession = false;

    // DOM Elements
    const input = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const chatWindow = document.getElementById('chat-window');
    const welcomeView = document.getElementById('welcome-view');
    const appContainer = document.getElementById('app-container');
    const historyList = document.getElementById('history-list');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay-bg');
    const fileInput = document.getElementById('file-input');
    const imagePreview = document.getElementById('image-preview');
    const innerPreview = document.getElementById('inner-preview');
    const uploadStatus = document.getElementById('upload-status');
    const content = document.getElementById('content-ready');

    // ============ FUNGSI UPLOAD KE UGUU ============
    async function uploadToUguu(file) {
        const formData = new FormData();
        formData.append('file', file);
        
        uploadStatus.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading image...';
        
        try {
            const response = await fetch('https://uguu.se/upload.php', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            if (result.success && result.url) {
                uploadStatus.innerHTML = '<i class="fa-solid fa-check-circle" style="color:#4ade80"></i> Gambar terupload!';
                setTimeout(() => uploadStatus.innerHTML = '', 2000);
                return result.url;
            } else {
                throw new Error('Upload failed');
            }
        } catch (error) {
            console.error('Upload error:', error);
            uploadStatus.innerHTML = '<i class="fa-solid fa-exclamation-circle" style="color:#ff4d4d"></i> Gagal upload gambar';
            setTimeout(() => uploadStatus.innerHTML = '', 3000);
            return null;
        }
    }

    // ============ FUNGSI CREATE SESSION ============
    async function createSession() {
        try {
            const response = await fetch(`${API_BASE}/v1/session/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            if (data.success) {
                currentSessionId = data.sessionId;
                // Update URL tanpa reload
                window.history.pushState({}, '', `/${currentSessionId}`);
                return currentSessionId;
            }
            throw new Error('Gagal create session');
        } catch (error) {
            console.error('Create session error:', error);
            return null;
        }
    }

    // ============ FUNGSI LOAD SESSION ============
    async function loadSession(sessionId) {
        if (isLoadingSession) return;
        isLoadingSession = true;
        
        try {
            const response = await fetch(`${API_BASE}/v1/session/check`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            });
            
            const data = await response.json();
            
            if (data.success && data.exists) {
                currentSessionId = sessionId;
                
                // Render history dari data
                const history = data.data.history || [];
                chatWindow.innerHTML = '';
                chatWindow.style.display = 'flex';
                welcomeView.style.display = 'none';
                
                for (const msg of history) {
                    const bubble = document.createElement('div');
                    bubble.className = `bubble ${msg.role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
                    
                    if (msg.role === 'assistant') {
                        const cont = document.createElement('div');
                        bubble.appendChild(cont);
                        chatWindow.appendChild(bubble);
                        cont.innerHTML = formatAiResponse(msg.text);
                        addCopyBtn(cont);
                    } else {
                        // Tampilkan pesan user, jika ada gambar tampilkan
                        let displayText = msg.text;
                        if (msg.image) {
                            displayText = `📷 ${displayText || 'Mengirim gambar'}`;
                        }
                        bubble.innerText = displayText;
                        chatWindow.appendChild(bubble);
                    }
                }
                
                forceScroll();
                
                // Simpan ke local history
                saveToLocalHistory(sessionId, history[0]?.text || 'Chat Session');
                renderHistoryList();
                
                return true;
            }
            return false;
        } catch (error) {
            console.error('Load session error:', error);
            return false;
        } finally {
            isLoadingSession = false;
        }
    }

    // ============ FUNGSI SEND CHAT ============
    async function sendMessage() {
        const message = input.value.trim();
        if (!message && !currentImageUrl) return;

        // Hide welcome view if needed
        if (welcomeView.style.display !== 'none') {
            welcomeView.style.display = 'none';
            chatWindow.style.display = 'flex';
        }

        // Tampilkan bubble user
        const userBubble = document.createElement('div');
        userBubble.className = 'bubble user-bubble';
        let userText = message;
        if (currentImageUrl) {
            userText = `${message || 'Mengirim gambar'} 📷`;
        }
        userBubble.innerText = userText;
        chatWindow.appendChild(userBubble);
        
        // Clear input
        input.value = '';
        input.style.height = 'auto';
        
        // Clear image preview
        if (currentImageUrl) {
            innerPreview.style.display = 'none';
            currentImageUrl = null;
            fileInput.value = '';
        }
        
        forceScroll();

        // Tampilkan typing indicator
        const aiBubble = document.createElement('div');
        aiBubble.className = 'bubble ai-bubble';
        aiBubble.innerHTML = `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        chatWindow.appendChild(aiBubble);
        forceScroll();

        try {
            // Pastikan ada session
            if (!currentSessionId) {
                await createSession();
            }
            
            // Prepare payload
            const payload = {
                sessionId: currentSessionId,
                message: message || "Apa yang ada di gambar ini?"
            };
            
            if (currentImageUrl) {
                payload.image = currentImageUrl;
            }
            
            const response = await fetch(`${API_BASE}/v1/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            
            // Remove typing indicator
            aiBubble.remove();
            
            if (data.success) {
                const aiResponse = data.response;
                const responseBubble = document.createElement('div');
                responseBubble.className = 'bubble ai-bubble';
                const cont = document.createElement('div');
                responseBubble.appendChild(cont);
                chatWindow.appendChild(responseBubble);
                cont.innerHTML = formatAiResponse(aiResponse);
                addCopyBtn(cont);
                
                // Update local history
                const firstMsg = chatWindow.querySelector('.user-bubble')?.innerText || message;
                saveToLocalHistory(currentSessionId, firstMsg.substring(0, 30));
                renderHistoryList();
            } else {
                throw new Error(data.error || 'Gagal dapat response');
            }
            
            forceScroll();
            
        } catch (error) {
            aiBubble.remove();
            const errorBubble = document.createElement('div');
            errorBubble.className = 'bubble ai-bubble';
            errorBubble.innerHTML = `Maaf, terjadi error: ${error.message}`;
            chatWindow.appendChild(errorBubble);
            forceScroll();
        }
    }

    // ============ UPLOAD GAMBAR ============
    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            const url = await uploadToUguu(file);
            if (url) {
                currentImageUrl = url;
                imagePreview.src = url;
                innerPreview.style.display = 'block';
                forceScroll();
            }
        }
    };

    document.getElementById('remove-img').onclick = () => {
        currentImageUrl = null;
        fileInput.value = '';
        innerPreview.style.display = 'none';
    };

    document.getElementById('gallery-trigger').onclick = () => fileInput.click();

    // ============ UTILITY FUNCTIONS ============
    function formatAiResponse(text) {
        if (!text) return "";
        return text
            .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: #60a5fa; text-decoration: underline;">Link</a>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
    }

    function addCopyBtn(element) {
        if (element.parentElement.querySelector('.copy-btn')) return;
        const cB = document.createElement('div');
        cB.className = 'copy-btn';
        cB.innerHTML = '<i class="fa-regular fa-copy"></i> Salin';
        cB.onclick = () => {
            navigator.clipboard.writeText(element.innerText);
            cB.innerHTML = '<i class="fa-solid fa-check" style="color:#4ade80"></i> Tersalin!';
            setTimeout(() => cB.innerHTML = '<i class="fa-regular fa-copy"></i> Salin', 2000);
        };
        element.parentElement.appendChild(cB);
    }

    function forceScroll() {
        setTimeout(() => {
            appContainer.scrollTop = appContainer.scrollHeight;
        }, 100);
    }

    // ============ HISTORY MANAGEMENT ============
    function saveToLocalHistory(sessionId, title) {
        let history = JSON.parse(localStorage.getItem('bagus_ai_sessions')) || [];
        if (!history.find(h => h.sessionId === sessionId)) {
            history.unshift({ sessionId, title: title.substring(0, 30), timestamp: Date.now() });
            // Keep only last 20 sessions
            history = history.slice(0, 20);
            localStorage.setItem('bagus_ai_sessions', JSON.stringify(history));
        }
    }

    function renderHistoryList() {
        const history = JSON.parse(localStorage.getItem('bagus_ai_sessions')) || [];
        historyList.innerHTML = '';
        history.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span onclick="switchToSession('${item.sessionId}')" style="flex:1;">${item.title}</span>
                <i class="fa-regular fa-trash-can trash-btn" onclick="deleteHistoryItem(event, '${item.sessionId}')"></i>
            `;
            historyList.appendChild(div);
        });
    }

    function switchToSession(sessionId) {
        window.location.href = `/${sessionId}`;
    }

    function deleteHistoryItem(event, sessionId) {
        event.stopPropagation();
        let history = JSON.parse(localStorage.getItem('bagus_ai_sessions')) || [];
        history = history.filter(h => h.sessionId !== sessionId);
        localStorage.setItem('bagus_ai_sessions', JSON.stringify(history));
        renderHistoryList();
    }

    // ============ NEW SESSION ============
    async function newSession() {
        const newId = await createSession();
        if (newId) {
            chatWindow.innerHTML = '';
            chatWindow.style.display = 'none';
            welcomeView.style.display = 'flex';
            input.value = '';
            currentImageUrl = null;
            innerPreview.style.display = 'none';
            fileInput.value = '';
            forceScroll();
        }
    }

    // ============ INITIALIZATION ============
    async function init() {
        // Get session ID from URL
        const pathId = window.location.pathname.split('/')[1];
        
        if (pathId && pathId.length === 15 && /^[a-z0-9]+$/.test(pathId)) {
            // Load existing session
            const loaded = await loadSession(pathId);
            if (!loaded) {
                // Session not found, create new
                await createSession();
            }
        } else {
            // No session in URL, create new
            await createSession();
        }
        
        renderHistoryList();
        
        // Hide preloader
        setTimeout(() => {
            document.getElementById('preloader-overlay').style.display = 'none';
            content.style.filter = 'blur(0px)';
        }, 1000);
    }

    // ============ EVENT LISTENERS ============
    sendBtn.onclick = sendMessage;
    document.getElementById('new-session-btn').onclick = newSession;
    document.getElementById('new-session-sidebar').onclick = newSession;
    
    input.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });
    
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Suggestion cards
    document.querySelectorAll('.card').forEach(card => {
        card.onclick = () => {
            input.value = card.getAttribute('data-suggest') || card.innerText;
            sendMessage();
        };
    });
    
    // Sidebar toggle
    document.getElementById('burger-trigger').onclick = () => {
        sidebar.classList.add('open');
        overlay.style.display = 'block';
        setTimeout(() => overlay.style.opacity = '1', 10);
    };
    
    overlay.onclick = () => {
        sidebar.classList.remove('open');
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 300);
    };
    
    // Theme
    const themeBtn = document.getElementById('theme-btn');
    function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        themeBtn.className = t === 'dark' ? 'fa-regular fa-moon theme-toggle' : 'fa-regular fa-sun theme-toggle';
    }
    applyTheme(localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    themeBtn.onclick = () => {
        const now = document.documentElement.getAttribute('data-theme');
        const newTheme = now === 'dark' ? 'light' : 'dark';
        applyTheme(newTheme);
        localStorage.setItem('theme', newTheme);
    };
    
    // Typing animation
    const phrases = ["Bagus!", "Sob!", "Kreator!", "Coder!"];
    let pIdx = 0, cIdx = 0, isDel = false;
    function type() {
        const cur = phrases[pIdx];
        const el = document.getElementById('typer');
        if(el) {
            el.innerText = isDel ? cur.substring(0, cIdx--) : cur.substring(0, cIdx++);
            let speed = isDel ? 100 : 200;
            if(!isDel && cIdx > cur.length) { isDel = true; speed = 2500; }
            else if(isDel && cIdx < 0) { isDel = false; pIdx = (pIdx + 1) % phrases.length; speed = 500; }
            setTimeout(type, speed);
        }
    }
    type();
    
    // Start
    init();
    
    // Expose functions for inline onclick
    window.switchToSession = switchToSession;
    window.deleteHistoryItem = deleteHistoryItem;
</script>
</body>
</html>
